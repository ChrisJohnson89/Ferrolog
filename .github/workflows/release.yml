name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bin: ferrolog
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: ferrolog
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: ferrolog

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build (release)
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/
          cd dist
          tar -czf ferrolog-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ matrix.bin }}

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum ferrolog-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > ferrolog-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
          else
            shasum -a 256 ferrolog-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > ferrolog-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ferrolog-${{ github.ref_name }}-${{ matrix.target }}
          path: dist/*

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/ferrolog-*.tar.gz
            artifacts/**/ferrolog-*.tar.gz.sha256
